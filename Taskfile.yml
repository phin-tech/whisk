version: "3"

vars:
  APP_NAME: "whisk-app"
  BIN_DIR: "bin"
  COVERAGE_MIN: '{{.COVERAGE_MIN | default "85"}}'
  COVERAGE_PACKAGES: "./internal/adapters/agents ./internal/adapters/ghcli ./internal/adapters/gitcli ./internal/adapters/hooks ./internal/adapters/processrunner ./internal/adapters/pty/native ./internal/adapters/workitemstore ./internal/adapters/worktrunk ./internal/app ./internal/client ./internal/daemon ./internal/domain/httpforward ./internal/domain/session ./internal/domain/workitem ./internal/server ./internal/wailsapp"
  COVERAGE_PROFILE: '{{.COVERAGE_PROFILE | default "/tmp/whisk-internal-cover.out"}}'
  DAEMON_ADDR: '{{.WHISKD_ADDR | default "127.0.0.1:8787"}}'
  DEV_DAEMON_ADDR: '{{.WHISKD_DEV_ADDR | default "127.0.0.1:8877"}}'
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  test:
    cmds:
      - go test ./...

  check:
    cmds:
      - task: test
      - task: frontend:check

  coverage:
    desc: Runs coverage for first-party daemon/runtime packages
    summary: Runs coverage for first-party daemon/runtime packages
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}
      - go tool cover -func={{.COVERAGE_PROFILE}}

  coverage:check:
    desc: Enforces minimum internal coverage
    summary: Enforces minimum internal coverage
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}

  coverage:profile:
    internal: true
    cmds:
      - go test {{.COVERAGE_PACKAGES}} -coverprofile={{.COVERAGE_PROFILE}}

  frontend:install:
    dir: frontend
    cmds:
      - npm install

  frontend:check:
    dir: frontend
    cmds:
      - npm run check

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  bindings:
    cmds:
      - wails3 generate bindings -ts -names -d frontend/bindings ./...

  build:daemon:
    desc: Builds the whisk daemon-mode executable
    summary: Builds the whisk daemon-mode executable
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk

  build:cli:
    desc: Builds the whisk CLI
    summary: Builds the whisk CLI
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk

  smoke:agent:
    desc: Runs an isolated CLI smoke test that launches a prompt-capture agent PTY
    summary: Starts a temporary whiskd, creates a project/work item, starts a prompt-capture run, and prints PTY output
    deps:
      - build:daemon
      - build:cli
    cmds:
      - sh scripts/smoke-agent.sh

  dev:daemon:
    desc: Runs the whisk daemon in the foreground
    summary: Runs the whisk daemon in the foreground
    cmds:
      - task: build:daemon
      - "{{.BIN_DIR}}/whisk daemon run -addr {{.DAEMON_ADDR}}"

  build:
    summary: Builds the application
    cmds:
      - task: build:daemon
      - task: build:cli
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Builds and runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    desc: Alias for dev:app
    summary: Alias for dev:app
    cmds:
      - task: dev:app

  dev:app:
    desc: Runs the macOS application in Wails development mode
    summary: Runs the macOS application in Wails development mode
    cmds:
      - task: build:daemon
      - task: build:cli
      - 'echo "task dev:app using WHISKD_URL=http://{{.DEV_DAEMON_ADDR}} WHISKD_PATH={{.BIN_DIR}}/whisk WHISK_CLI={{.BIN_DIR}}/whisk"'
      - 'echo "The app will reuse a compatible running sidecar or start one if needed."'
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
    env:
      WHISKD_PATH: "{{.BIN_DIR}}/whisk"
      WHISK_CLI: "{{.BIN_DIR}}/whisk"
      WHISKD_URL: "http://{{.DEV_DAEMON_ADDR}}"

  setup:docker:
    summary: Builds Docker image for cross-compilation
    cmds:
      - task: common:setup:docker
