version: "3"

vars:
  APP_NAME: "Whisk"
  # Filename of the GUI executable inside Whisk.app/Contents/MacOS. It MUST differ from the
  # CLI binary name ("whisk") because macOS filesystems are case-insensitive by default:
  # a GUI named "Whisk" and a CLI named "whisk" resolve to the same file and clobber each
  # other, which previously bundled the GUI as its own daemon helper and caused a fork loop.
  BINARY_NAME: "whisk-app"
  BIN_DIR: "bin"
  COVERAGE_MIN: '{{.COVERAGE_MIN | default "82.3"}}'
  COVERAGE_PACKAGES: "./internal/adapters/agents ./internal/adapters/pty/native ./internal/adapters/workitemstore ./internal/adapters/worktrunk ./internal/app ./internal/appsettings ./internal/client ./internal/daemon ./internal/domain/httpforward ./internal/domain/session ./internal/domain/workitem ./internal/server ./internal/wailsapp"
  COVERAGE_PROFILE: '{{.COVERAGE_PROFILE | default "/tmp/whisk-internal-cover.out"}}'
  DAEMON_ADDR: '{{.WHISKD_ADDR | default "127.0.0.1:8787"}}'
  DEV_DAEMON_ADDR: '{{.WHISKD_DEV_ADDR | default "127.0.0.1:8877"}}'
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  APP_VERSION:
    sh: scripts/current-version.sh
  GIT_SHA:
    sh: git rev-parse HEAD 2>/dev/null || echo unknown
  GIT_DIRTY:
    sh: test -n "$(git status --porcelain)" && echo true || echo false
  BUILDINFO_LDFLAGS: "-X github.com/phin-tech/whisk/internal/buildinfo.version={{.APP_VERSION}} -X github.com/phin-tech/whisk/internal/buildinfo.gitSHA={{.GIT_SHA}} -X github.com/phin-tech/whisk/internal/buildinfo.dirty={{.GIT_DIRTY}}"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

tasks:
  test:
    cmds:
      - go test ./...

  check:
    cmds:
      - task: test
      - task: frontend:check

  coverage:
    desc: Runs coverage for first-party daemon/runtime packages
    summary: Runs coverage for first-party daemon/runtime packages
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}
      - go tool cover -func={{.COVERAGE_PROFILE}}

  coverage:check:
    desc: Enforces minimum internal coverage
    summary: Enforces minimum internal coverage
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}

  coverage:profile:
    internal: true
    cmds:
      - go test {{.COVERAGE_PACKAGES}} -coverprofile={{.COVERAGE_PROFILE}}

  frontend:install:
    dir: frontend
    cmds:
      - npm install

  frontend:check:
    dir: frontend
    cmds:
      - npm run check

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  docs:build:
    desc: Builds the published docs site
    cmds:
      - npm run docs:build

  bindings:
    cmds:
      - wails3 generate bindings -ts -names -d frontend/bindings ./...

  sdk:spec:
    desc: Generates sdk/openapi.json from the daemon protocol/domain structs
    summary: Generates the OpenAPI spec (source of truth for all generated clients)
    cmds:
      - go run ./cmd/gen-openapi -o sdk/openapi.json

  sdk:python:
    desc: Generates the Python client from sdk/openapi.json
    deps: [sdk:spec]
    cmds:
      - rm -rf sdk/python/whiskd_client
      - uvx --from openapi-python-client openapi-python-client generate --path sdk/openapi.json --output-path sdk/python/whiskd_client --overwrite --meta none
      - go run ./cmd/gen-python-sdk-local -o sdk/python/whiskd_client/local.py

  sdk:ts:
    desc: Generates the headless TypeScript types from sdk/openapi.json
    deps: [sdk:spec]
    cmds:
      - mkdir -p sdk/ts
      - npx -y openapi-typescript@latest sdk/openapi.json -o sdk/ts/whiskd.d.ts

  sdk:go:
    desc: Generates the Go client wrapper from daemon protocol types
    cmds:
      - go run ./cmd/gen-go-sdk -o sdk/go/whiskd/client.go

  sdk:
    desc: Regenerates the OpenAPI spec and the Python + TypeScript + Go clients
    cmds:
      - task: sdk:python
      - task: sdk:ts
      - task: sdk:go

  sdk:check:
    desc: Fails if sdk/openapi.json is stale or the route table drifts from the server (CI guard)
    summary: Runs the route-parity tests and diffs the regenerated spec against the committed one
    cmds:
      - go test ./cmd/gen-openapi/
      - go test ./cmd/gen-go-sdk/
      - go run ./cmd/gen-openapi -o /tmp/whiskd-openapi.json
      - cmd: diff -u sdk/openapi.json /tmp/whiskd-openapi.json
        msg: "sdk/openapi.json is out of date; run `task sdk:spec` and commit the result."
      - go run ./cmd/gen-go-sdk -o /tmp/whiskd-go-sdk.go
      - cmd: diff -u sdk/go/whiskd/client.go /tmp/whiskd-go-sdk.go
        msg: "sdk/go/whiskd/client.go is out of date; run `task sdk:go` and commit the result."

  sdk:test:python:
    desc: Runs the Python SDK integration suite against a live daemon
    cmds:
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk
      - WHISKD_BIN="$PWD/{{.BIN_DIR}}/whisk" uv run --no-project --with pytest --with httpx --with attrs --with python-dateutil pytest sdk/tests/python

  sdk:test:ts:
    desc: Runs the headless TypeScript SDK integration suite against a live daemon
    cmds:
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk
      - npm --prefix sdk/tests/ts install --no-audit --no-fund
      - WHISKD_BIN="$PWD/{{.BIN_DIR}}/whisk" npm --prefix sdk/tests/ts test

  sdk:test:go:
    desc: Runs the Go SDK integration suite against a live daemon
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk
      - task: sdk:test:go:run

  sdk:test:go:run:
    internal: true
    dir: sdk/tests/go
    cmds:
      - WHISKD_BIN="$PWD/../../../{{.BIN_DIR}}/whisk" go test ./...

  sdk:test:
    desc: Runs all SDK integration suites (Python + TypeScript + Go) against a live daemon
    cmds:
      - task: sdk:test:python
      - task: sdk:test:ts
      - task: sdk:test:go

  build:daemon:
    desc: Builds the whisk daemon-mode executable
    summary: Builds the whisk daemon-mode executable
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags="{{.BUILDINFO_LDFLAGS}}" -o {{.BIN_DIR}}/whisk ./cmd/whisk

  build:cli:
    desc: Builds the whisk CLI
    summary: Builds the whisk CLI
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags="{{.BUILDINFO_LDFLAGS}}" -o {{.BIN_DIR}}/whisk ./cmd/whisk

  smoke:agent:
    desc: Runs an isolated CLI smoke test that launches a prompt-capture agent PTY
    summary: Starts a temporary whiskd, creates a project/work item, starts a prompt-capture run, and prints PTY output
    deps:
      - build:daemon
      - build:cli
    cmds:
      - sh scripts/smoke-agent.sh

  test:remote:docker:
    desc: Runs CLI-only install smoke in a Docker Linux container
    cmds:
      - uv run --project tests/integration pytest tests/integration/test_remote_docker.py

  test:remote:agent:openrouter:
    desc: Runs optional Claude Code/OpenRouter agent smoke in Docker
    cmds:
      - sh scripts/test-remote-agent-openrouter.sh

  test:agent:claude:ask-user-question:
    desc: Runs optional real Claude Code native AskUserQuestion smoke
    cmds:
      - sh scripts/test-real-claude-ask-user-question.sh

  dev:seed:workitems:
    desc: Resets and reseeds the dev daemon with UAT work items
    summary: |
      Clears UAT seed work items and creates examples across Backlog, Planning,
      Ready, Execution, Review, Done, and Blocked. Optionally pass a
      port/address/URL, for example: task dev:seed:workitems -- 8877
    deps:
      - build:cli
    cmds:
      - sh scripts/dev-seed-workitems.sh {{.CLI_ARGS}}
    env:
      WHISKD_DEV_ADDR: "{{.DEV_DAEMON_ADDR}}"

  integration:test:
    desc: Runs pytest black-box integration tests against a real whisk daemon
    summary: Builds the CLI, then runs the isolated uv pytest suite in tests/integration
    deps:
      - build:cli
    cmds:
      - WHISK_BIN="{{.TASKFILE_DIR}}/{{.BIN_DIR}}/whisk" uv run --project tests/integration pytest tests/integration

  dev:local-install:
    desc: Builds and installs the macOS app into /Applications
    platforms: [darwin]
    deps:
      - task: darwin:package
    vars:
      INSTALL_DIR: '{{.INSTALL_DIR | default "/Applications"}}'
    cmds:
      - mkdir -p "{{.INSTALL_DIR}}"
      - ditto "{{.BIN_DIR}}/{{.APP_NAME}}.app" "{{.INSTALL_DIR}}/{{.APP_NAME}}.app"

  dev:daemon:
    desc: Runs the whisk daemon in the foreground
    summary: Runs the whisk daemon in the foreground
    cmds:
      - task: build:daemon
      - "{{.BIN_DIR}}/whisk daemon run -addr {{.DAEMON_ADDR}}"

  build:
    summary: Builds the application
    cmds:
      - task: build:daemon
      - task: build:cli
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  sign:
    desc: "Build, sign, and notarize the macOS app"
    platforms: [darwin]
    preconditions:
      - sh: '[ -n "${APPLE_SIGNING_IDENTITY:-}" ]'
        msg: "APPLE_SIGNING_IDENTITY is required"
      - sh: '[ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]'
        msg: "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID are required"
    cmds:
      - KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE:-whisk-notary}" scripts/ci-setup-notary-profile.sh
      - task: build:cli
      - |
        KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE:-whisk-notary}"
        task darwin:sign:notarize \
          SIGN_IDENTITY="${APPLE_SIGNING_IDENTITY}" \
          KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE}"

  sign:op:
    desc: "Run the signing workflow with secrets loaded from 1Password"
    platforms: [darwin]
    preconditions:
      - sh: "command -v op >/dev/null 2>&1"
        msg: "1Password CLI 'op' is required"
      - sh: '[ -f ".env.signing" ]'
        msg: ".env.signing is required"
    cmds:
      - op run --env-file=.env.signing -- scripts/sign-with-op-env.sh

  build:signed:
    desc: "Alias for the macOS signing flow"
    cmds:
      - task: sign

  build:signed:op:
    desc: "Alias for the 1Password-backed macOS signing flow"
    cmds:
      - task: sign:op

  publish:
    desc: "Create or update the GitHub release with the verified macOS DMG"
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -d "bin/Whisk.app" ]'
        msg: "bin/Whisk.app is required; run task sign first"
    cmds:
      - task: publish:verified

  publish:op:
    desc: "Sign with 1Password-backed secrets, then publish the current version"
    cmds:
      - task: sign:op
      - task: publish

  publish:verified:
    desc: "Package, verify, upload, download, and re-verify the current signed macOS DMG"
    platforms: [darwin]
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -d "bin/Whisk.app" ]'
        msg: "bin/Whisk.app is required; run task sign:op first"
    cmds:
      - |
        set -euo pipefail
        VERSION=$(scripts/current-version.sh)
        TAG="v${VERSION}"
        APP_DMG="bin/Whisk-${TAG}-macos.dmg"
        DOWNLOAD_DIR=$(mktemp -d)
        cleanup() {
          rm -rf "${DOWNLOAD_DIR}"
        }
        trap cleanup EXIT

        scripts/verify-macos-artifact.sh bin/Whisk.app
        KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE:-whisk-notary}" \
          scripts/package-notarized-dmg.sh bin/Whisk.app "${APP_DMG}"
        scripts/verify-macos-artifact.sh "${APP_DMG}"

        shasum -a 256 "${APP_DMG}"

        PRE_FLAG=""
        if echo "$VERSION" | grep -q '-'; then
          PRE_FLAG="--prerelease"
        fi

        if ! gh release view "$TAG" --repo phin-tech/whisk >/dev/null 2>&1; then
          gh release create "$TAG" --repo phin-tech/whisk --title "$TAG" --notes "Signed macOS Whisk build." $PRE_FLAG
        elif [ -n "$PRE_FLAG" ]; then
          gh release edit "$TAG" --repo phin-tech/whisk $PRE_FLAG
        fi

        gh release upload "${TAG}" "${APP_DMG}" --repo phin-tech/whisk --clobber
        gh release download "${TAG}" --repo phin-tech/whisk --pattern "$(basename "${APP_DMG}")" --dir "${DOWNLOAD_DIR}" --clobber
        shasum -a 256 "${DOWNLOAD_DIR}/$(basename "${APP_DMG}")"
        scripts/verify-macos-artifact.sh "${DOWNLOAD_DIR}/$(basename "${APP_DMG}")"

  release:local:
    desc: "Sign locally with 1Password, verify the macOS DMG on this Mac, upload it, and verify the uploaded copy"
    platforms: [darwin]
    cmds:
      - task: sign:op
      - task: publish:verified

  ci:sync-secrets:
    desc: "Push signing/notarization secrets from 1Password into GitHub Actions secrets"
    preconditions:
      - sh: "command -v op >/dev/null 2>&1"
        msg: "1Password CLI 'op' is required"
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -f ".env.signing" ]'
        msg: ".env.signing is required"
    cmds:
      - scripts/sync-gh-secrets.sh

  ci:trigger:
    desc: "Dispatch the release workflow for the current build/config.yml version"
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
    cmds:
      - |
        set -euo pipefail
        VERSION="{{.VERSION}}"
        if [ -z "$VERSION" ]; then
          VERSION=$(scripts/current-version.sh)
        fi
        TAG="v${VERSION}"
        gh workflow run release.yml --repo phin-tech/whisk --ref main -f version="${TAG}"
    vars:
      VERSION: "{{.VERSION}}"

  release:
    desc: "Bump, tag, push, and dispatch release. Usage: task release BUMP=patch [PRE=pre]"
    preconditions:
      - sh: '[ -n "{{.BUMP}}" ]'
        msg: "BUMP is required: patch, minor, or major"
      - sh: "git diff --quiet && git diff --cached --quiet"
        msg: "Working tree must be clean before releasing"
    cmds:
      - |
        set -euo pipefail
        VERSION=$(BUMP="{{.BUMP}}" PRE="{{.PRE}}" scripts/bump-version.sh)
        wails3 task common:update:build-assets
        git add build/config.yml build/darwin/Info.dev.plist build/darwin/Info.plist build/linux/desktop build/linux/nfpm/nfpm.yaml build/windows/info.json build/windows/nsis/wails_tools.nsh build/windows/wails.exe.manifest
        if [ -n "{{.PRE}}" ]; then
          git commit -m "pre-release: v${VERSION}"
        else
          git commit -m "release: v${VERSION}"
        fi
        git tag "v${VERSION}"
        git push origin main
        git push origin "v${VERSION}"
        task ci:trigger VERSION="${VERSION}"

  run:
    summary: Builds and runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    desc: Alias for dev:app
    summary: Alias for dev:app
    cmds:
      - task: dev:app

  dev:app:
    desc: Runs the macOS application in Wails development mode
    summary: Runs the macOS application in Wails development mode
    cmds:
      - task: build:daemon
      - task: build:cli
      - 'echo "task dev:app using WHISKD_URL=http://{{.DEV_DAEMON_ADDR}} WHISKD_PATH={{.BIN_DIR}}/whisk WHISK_CLI={{.BIN_DIR}}/whisk WHISK_PLUGIN_DIRS={{.ROOT_DIR}}/../whisk-plugins/registry/plugins/github-issues"'
      - 'echo "The app will reuse a compatible running sidecar or start one if needed."'
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
    env:
      WHISKD_PATH: "{{.BIN_DIR}}/whisk"
      WHISK_CLI: "{{.BIN_DIR}}/whisk"
      WHISKD_URL: "http://{{.DEV_DAEMON_ADDR}}"
      WHISK_PLUGIN_DIRS: "{{.ROOT_DIR}}/../whisk-plugins/registry/plugins/github-issues"

  dev:app:restart:
    desc: Restarts the development daemon, then runs the macOS app
    summary: Stops the dev daemon at DEV_DAEMON_ADDR before delegating to dev:app
    cmds:
      - task: build:daemon
      - '{{.BIN_DIR}}/whisk daemon stop -url http://{{.DEV_DAEMON_ADDR}}'
      - task: dev:app

  setup:docker:
    summary: Builds Docker image for cross-compilation
    cmds:
      - task: common:setup:docker
