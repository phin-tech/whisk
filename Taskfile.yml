version: "3"

vars:
  APP_NAME: "Whisk"
  BIN_DIR: "bin"
  COVERAGE_MIN: '{{.COVERAGE_MIN | default "85"}}'
  COVERAGE_PACKAGES: "./internal/adapters/agents ./internal/adapters/ghcli ./internal/adapters/gitcli ./internal/adapters/hooks ./internal/adapters/processrunner ./internal/adapters/pty/native ./internal/adapters/workitemstore ./internal/adapters/worktrunk ./internal/app ./internal/appsettings ./internal/client ./internal/daemon ./internal/domain/httpforward ./internal/domain/session ./internal/domain/workitem ./internal/server ./internal/wailsapp"
  COVERAGE_PROFILE: '{{.COVERAGE_PROFILE | default "/tmp/whisk-internal-cover.out"}}'
  DAEMON_ADDR: '{{.WHISKD_ADDR | default "127.0.0.1:8787"}}'
  DEV_DAEMON_ADDR: '{{.WHISKD_DEV_ADDR | default "127.0.0.1:8877"}}'
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  test:
    cmds:
      - go test ./...

  check:
    cmds:
      - task: test
      - task: frontend:check

  coverage:
    desc: Runs coverage for first-party daemon/runtime packages
    summary: Runs coverage for first-party daemon/runtime packages
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}
      - go tool cover -func={{.COVERAGE_PROFILE}}

  coverage:check:
    desc: Enforces minimum internal coverage
    summary: Enforces minimum internal coverage
    cmds:
      - task: coverage:profile
      - go run ./cmd/coveragegate -profile {{.COVERAGE_PROFILE}} -min {{.COVERAGE_MIN}}

  coverage:profile:
    internal: true
    cmds:
      - go test {{.COVERAGE_PACKAGES}} -coverprofile={{.COVERAGE_PROFILE}}

  frontend:install:
    dir: frontend
    cmds:
      - npm install

  frontend:check:
    dir: frontend
    cmds:
      - npm run check

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  bindings:
    cmds:
      - wails3 generate bindings -ts -names -d frontend/bindings ./...

  sdk:spec:
    desc: Generates sdk/openapi.json from the daemon protocol/domain structs
    summary: Generates the OpenAPI spec (source of truth for all generated clients)
    cmds:
      - go run ./cmd/gen-openapi -o sdk/openapi.json

  sdk:python:
    desc: Generates the Python client from sdk/openapi.json
    deps: [sdk:spec]
    cmds:
      - rm -rf sdk/python/whiskd_client
      - uvx --from openapi-python-client openapi-python-client generate --path sdk/openapi.json --output-path sdk/python/whiskd_client --overwrite --meta none

  sdk:ts:
    desc: Generates the headless TypeScript types from sdk/openapi.json
    deps: [sdk:spec]
    cmds:
      - mkdir -p sdk/ts
      - npx -y openapi-typescript@latest sdk/openapi.json -o sdk/ts/whiskd.d.ts

  sdk:
    desc: Regenerates the OpenAPI spec and the Python + TypeScript clients
    cmds:
      - task: sdk:python
      - task: sdk:ts

  sdk:check:
    desc: Fails if sdk/openapi.json is stale or the route table drifts from the server (CI guard)
    summary: Runs the route-parity tests and diffs the regenerated spec against the committed one
    cmds:
      - go test ./cmd/gen-openapi/
      - go run ./cmd/gen-openapi -o /tmp/whiskd-openapi.json
      - cmd: diff -u sdk/openapi.json /tmp/whiskd-openapi.json
        msg: "sdk/openapi.json is out of date; run `task sdk:spec` and commit the result."

  sdk:test:python:
    desc: Runs the Python SDK integration suite against a live daemon
    cmds:
      - go build -o {{.BIN_DIR}}/whiskd ./cmd/whiskd
      - WHISKD_BIN="$PWD/{{.BIN_DIR}}/whiskd" uv run --no-project --with pytest --with httpx --with attrs --with python-dateutil pytest sdk/tests/python

  sdk:test:ts:
    desc: Runs the headless TypeScript SDK integration suite against a live daemon
    cmds:
      - go build -o {{.BIN_DIR}}/whiskd ./cmd/whiskd
      - npm --prefix sdk/tests/ts install --no-audit --no-fund
      - WHISKD_BIN="$PWD/{{.BIN_DIR}}/whiskd" npm --prefix sdk/tests/ts test

  sdk:test:
    desc: Runs both SDK integration suites (Python + TypeScript) against a live daemon
    cmds:
      - task: sdk:test:python
      - task: sdk:test:ts

  build:daemon:
    desc: Builds the whisk daemon-mode executable
    summary: Builds the whisk daemon-mode executable
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk

  build:cli:
    desc: Builds the whisk CLI
    summary: Builds the whisk CLI
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/whisk ./cmd/whisk

  smoke:agent:
    desc: Runs an isolated CLI smoke test that launches a prompt-capture agent PTY
    summary: Starts a temporary whiskd, creates a project/work item, starts a prompt-capture run, and prints PTY output
    deps:
      - build:daemon
      - build:cli
    cmds:
      - sh scripts/smoke-agent.sh

  dev:seed:workitems:
    desc: Resets and reseeds the dev daemon with UAT work items
    summary: |
      Clears UAT seed work items and creates examples across Backlog, Planning,
      Ready, Execution, Review, Done, and Blocked. Optionally pass a
      port/address/URL, for example: task dev:seed:workitems -- 8877
    deps:
      - build:cli
    cmds:
      - sh scripts/dev-seed-workitems.sh {{.CLI_ARGS}}
    env:
      WHISKD_DEV_ADDR: "{{.DEV_DAEMON_ADDR}}"

  integration:test:
    desc: Runs pytest black-box integration tests against a real whisk daemon
    summary: Builds the CLI, then runs the isolated uv pytest suite in tests/integration
    deps:
      - build:cli
    cmds:
      - WHISK_BIN="{{.TASKFILE_DIR}}/{{.BIN_DIR}}/whisk" uv run --project tests/integration pytest tests/integration

  dev:daemon:
    desc: Runs the whisk daemon in the foreground
    summary: Runs the whisk daemon in the foreground
    cmds:
      - task: build:daemon
      - "{{.BIN_DIR}}/whisk daemon run -addr {{.DAEMON_ADDR}}"

  build:
    summary: Builds the application
    cmds:
      - task: build:daemon
      - task: build:cli
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  sign:
    desc: "Build, sign, and notarize the macOS app"
    platforms: [darwin]
    preconditions:
      - sh: '[ -n "${APPLE_SIGNING_IDENTITY:-}" ]'
        msg: "APPLE_SIGNING_IDENTITY is required"
      - sh: '[ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]'
        msg: "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID are required"
    cmds:
      - KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE:-whisk-notary}" scripts/ci-setup-notary-profile.sh
      - |
        KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE:-whisk-notary}"
        task darwin:sign:notarize \
          SIGN_IDENTITY="${APPLE_SIGNING_IDENTITY}" \
          KEYCHAIN_PROFILE="${KEYCHAIN_PROFILE}"

  sign:op:
    desc: "Run the signing workflow with secrets loaded from 1Password"
    platforms: [darwin]
    preconditions:
      - sh: "command -v op >/dev/null 2>&1"
        msg: "1Password CLI 'op' is required"
      - sh: '[ -f ".env.signing" ]'
        msg: ".env.signing is required"
    cmds:
      - op run --env-file=.env.signing -- task sign

  build:signed:
    desc: "Alias for the macOS signing flow"
    cmds:
      - task: sign

  build:signed:op:
    desc: "Alias for the 1Password-backed macOS signing flow"
    cmds:
      - task: sign:op

  publish:
    desc: "Create or update the GitHub release for the current build/config.yml version"
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -d "bin/Whisk.app" ]'
        msg: "bin/Whisk.app is required; run task sign first"
    cmds:
      - |
        set -euo pipefail
        VERSION=$(scripts/current-version.sh)
        TAG="v${VERSION}"
        APP_ZIP="bin/Whisk_${VERSION}.app.zip"

        ditto -c -k --sequesterRsrc --keepParent bin/Whisk.app "${APP_ZIP}"

        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges || true)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" --no-merges || true)
        fi
        if [ -z "$CHANGELOG" ]; then
          CHANGELOG="Signed macOS Whisk build."
        fi

        PRE_FLAG=""
        if echo "$VERSION" | grep -q '-'; then
          PRE_FLAG="--prerelease"
        fi

        if ! gh release view "$TAG" &>/dev/null; then
          gh release create "$TAG" --title "$TAG" --notes "$CHANGELOG" $PRE_FLAG
        else
          gh release edit "$TAG" --notes "$CHANGELOG" $PRE_FLAG
        fi
        gh release upload "$TAG" "${APP_ZIP}" --clobber

  publish:op:
    desc: "Sign with 1Password-backed secrets, then publish the current version"
    cmds:
      - task: sign:op
      - task: publish

  publish:verified:
    desc: "Package, verify, and upload the current signed macOS app zip"
    platforms: [darwin]
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -d "bin/Whisk.app" ]'
        msg: "bin/Whisk.app is required; run task sign:op first"
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR=$PWD
        VERSION=$(scripts/current-version.sh)
        TAG="v${VERSION}"
        APP_ZIP="bin/Whisk-${TAG}-macos.zip"
        VERIFY_DIR=$(mktemp -d)
        CERT_DIR=$(mktemp -d)
        cleanup() {
          rm -rf "${VERIFY_DIR}" "${CERT_DIR}"
        }
        trap cleanup EXIT

        codesign --verify --deep --strict --verbose=4 bin/Whisk.app
        spctl -a -vvv -t execute bin/Whisk.app

        (
          cd "${CERT_DIR}"
          codesign -d --extract-certificates "${ROOT_DIR}/bin/Whisk.app" >/dev/null
          test -e codesign0
        )

        ditto -c -k --keepParent bin/Whisk.app "${APP_ZIP}"
        ditto -x -k "${APP_ZIP}" "${VERIFY_DIR}"

        codesign --verify --deep --strict --verbose=4 "${VERIFY_DIR}/Whisk.app"
        spctl -a -vvv -t execute "${VERIFY_DIR}/Whisk.app"

        shasum -a 256 "${APP_ZIP}"
        gh release upload "${TAG}" "${APP_ZIP}" --repo phin-tech/whisk --clobber

  release:local:
    desc: "Sign locally with 1Password, verify the macOS zip on this Mac, and upload it"
    platforms: [darwin]
    cmds:
      - task: sign:op
      - task: publish:verified

  ci:sync-secrets:
    desc: "Push signing/notarization secrets from 1Password into GitHub Actions secrets"
    preconditions:
      - sh: "command -v op >/dev/null 2>&1"
        msg: "1Password CLI 'op' is required"
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
      - sh: '[ -f ".env.signing" ]'
        msg: ".env.signing is required"
    cmds:
      - scripts/sync-gh-secrets.sh

  ci:trigger:
    desc: "Dispatch the release workflow for the current build/config.yml version"
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
    cmds:
      - |
        set -euo pipefail
        VERSION="{{.VERSION}}"
        if [ -z "$VERSION" ]; then
          VERSION=$(scripts/current-version.sh)
        fi
        TAG="v${VERSION}"
        gh workflow run release.yml --repo phin-tech/whisk --ref main -f version="${TAG}"
    vars:
      VERSION: "{{.VERSION}}"

  release:
    desc: "Bump, tag, push, and dispatch release. Usage: task release BUMP=patch [PRE=pre]"
    preconditions:
      - sh: '[ -n "{{.BUMP}}" ]'
        msg: "BUMP is required: patch, minor, or major"
      - sh: "git diff --quiet && git diff --cached --quiet"
        msg: "Working tree must be clean before releasing"
    cmds:
      - |
        set -euo pipefail
        VERSION=$(BUMP="{{.BUMP}}" PRE="{{.PRE}}" scripts/bump-version.sh)
        wails3 task common:update:build-assets
        git add build/config.yml build/darwin/Info.dev.plist build/darwin/Info.plist build/ios/Info.dev.plist build/ios/Info.plist build/ios/LaunchScreen.storyboard build/ios/build.sh build/ios/entitlements.plist build/ios/project.pbxproj build/linux/desktop build/linux/nfpm/nfpm.yaml build/windows/info.json build/windows/nsis/wails_tools.nsh build/windows/wails.exe.manifest
        if [ -n "{{.PRE}}" ]; then
          git commit -m "pre-release: v${VERSION}"
        else
          git commit -m "release: v${VERSION}"
        fi
        git tag "v${VERSION}"
        git push origin main
        git push origin "v${VERSION}"
        task ci:trigger VERSION="${VERSION}"

  run:
    summary: Builds and runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    desc: Alias for dev:app
    summary: Alias for dev:app
    cmds:
      - task: dev:app

  dev:app:
    desc: Runs the macOS application in Wails development mode
    summary: Runs the macOS application in Wails development mode
    cmds:
      - task: build:daemon
      - task: build:cli
      - 'echo "task dev:app using WHISKD_URL=http://{{.DEV_DAEMON_ADDR}} WHISKD_PATH={{.BIN_DIR}}/whisk WHISK_CLI={{.BIN_DIR}}/whisk"'
      - 'echo "The app will reuse a compatible running sidecar or start one if needed."'
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
    env:
      WHISKD_PATH: "{{.BIN_DIR}}/whisk"
      WHISK_CLI: "{{.BIN_DIR}}/whisk"
      WHISKD_URL: "http://{{.DEV_DAEMON_ADDR}}"

  setup:docker:
    summary: Builds Docker image for cross-compilation
    cmds:
      - task: common:setup:docker
